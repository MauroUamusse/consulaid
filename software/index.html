<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>LOGIN</title>
      <!-- Google Font: Source Sans Pro -->
      <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
      <!-- Font Awesome -->
      <link rel="stylesheet" href="asset/fontawesome/css/all.min.css">
      <!-- Theme style -->
      <link rel="stylesheet" href="asset/css/adminlte.min.css">
   </head>
   <body class="hold-transition login-page">
      <div class="login-box">
         <!-- /.login-logo -->
         <div class="card card-outline card-primary">
            <div class="card-header text-center">
               <a href="index.html" class="brand-link">
               <img src="asset/img/logoc.jpg" alt="Consulaid" width="200">
               </a>
            </div>
            <div class="card-body">
               <form action="admin" method="post">
                  <div class="input-group mb-3">
                     <input type="email" class="form-control" placeholder="Email" required>
                     <div class="input-group-append">
                        <div class="input-group-text">
                           <span class="fas fa-envelope"></span>
                        </div>
                     </div>
                  </div>
                  <div class="input-group mb-3">
                     <input type="password" class="form-control" placeholder="Senha">
                     <div class="input-group-append">
                        <div class="input-group-text">
                           <span class="fas fa-lock"></span>
                        </div>
                     </div>
                  </div>
                  <div class="row">
                     <div class="col-12">
                        <div class="icheck-primary">
                           <input type="checkbox" id="remember">
                           <label for="remember">
                           Lembrar
                           </label>
                        </div>
                     </div>
                     <div class="col-6">
                        <!--<button type="submit" class="btn btn-info btn-block">Aceder</button>-->
                        <a href="admin/index.html" class="text-center btn btn-info btn-block">Aceder</a>
                     </div>
                     <div class="col-6">
                        <a href="register.html" class="text-center btn btn-info btn-block">Esqueceu a Senha</a>
                     </div>
                  </div>
               </form>
            </div>
            <!-- /.card-body -->
         </div>
         <!-- /.card -->
      </div>
      <!-- /.login-box -->
   </body>
</html>
